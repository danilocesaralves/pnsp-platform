name: PNSP E2E Tests

on:
  schedule:
    - cron: "0 6 * * *"   # diariamente às 06:00 UTC
  workflow_dispatch:        # execução manual

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.4.1"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL: ""
      JWT_SECRET: "e2e-test-secret-32-chars-minimum-x"
      VITE_APP_ID: "e2e-test"
      OAUTH_SERVER_URL: "https://api.manus.im"
      VITE_OAUTH_PORTAL_URL: "https://auth.manus.im"
      OWNER_OPEN_ID: "e2e-owner"
      OWNER_NAME: "E2E Owner"
      BUILT_IN_FORGE_API_URL: "https://api.manus.im"
      BUILT_IN_FORGE_API_KEY: "e2e-key"
      VITE_FRONTEND_FORGE_API_KEY: "e2e-key"
      VITE_FRONTEND_FORGE_API_URL: "https://api.manus.im"
      STRIPE_SECRET_KEY: "sk_test_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
      VITE_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
      BASE_URL: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start server (background)
        run: node dist/index.js &
        env:
          NODE_ENV: production
          PORT: 3000

      - name: Wait for server
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/api/health && break
            sleep 2
          done

      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
