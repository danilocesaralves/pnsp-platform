name: PNSP CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting (non-blocking)
        run: pnpm prettier --check . --ignore-path .gitignore
        continue-on-error: true
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: TypeScript type check
        run: pnpm check
  test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ""
      JWT_SECRET: "ci-test-secret-32-chars-minimum-x"
      VITE_APP_ID: "ci-test"
      OAUTH_SERVER_URL: "https://api.manus.im"
      VITE_OAUTH_PORTAL_URL: "https://auth.manus.im"
      OWNER_OPEN_ID: "ci-owner"
      OWNER_NAME: "CI Owner"
      BUILT_IN_FORGE_API_URL: "https://api.manus.im"
      BUILT_IN_FORGE_API_KEY: "ci-key"
      VITE_FRONTEND_FORGE_API_KEY: "ci-key"
      VITE_FRONTEND_FORGE_API_URL: "https://api.manus.im"
      STRIPE_SECRET_KEY: "sk_test_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
      VITE_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    env:
      DATABASE_URL: "mysql://placeholder:placeholder@localhost:3306/pnsp"
      JWT_SECRET: "build-placeholder-secret-32chars-ok"
      VITE_APP_ID: "build-placeholder"
      OAUTH_SERVER_URL: "https://api.manus.im"
      VITE_OAUTH_PORTAL_URL: "https://auth.manus.im"
      OWNER_OPEN_ID: "build-owner"
      OWNER_NAME: "Build Owner"
      BUILT_IN_FORGE_API_URL: "https://api.manus.im"
      BUILT_IN_FORGE_API_KEY: "build-key"
      VITE_FRONTEND_FORGE_API_KEY: "build-key"
      VITE_FRONTEND_FORGE_API_URL: "https://api.manus.im"
      STRIPE_SECRET_KEY: "sk_test_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
      VITE_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build production bundle
        run: pnpm build
  ci-success:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build]
    if: always()
    steps:
      - name: Check all required jobs
        run: |
          if [[ "${{ needs.typecheck.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" ]]; then
            echo "CI failed"
            exit 1
          fi
          echo "PNSP CI passed"
