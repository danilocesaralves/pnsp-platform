name: PNSP CD — Deploy

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.4.1"

jobs:
  # ── 1. CI gate — garante que main está verde antes de qualquer deploy ────────
  ci-check:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: ""
      JWT_SECRET: "cd-test-secret-32-chars-minimum-x"
      VITE_APP_ID: "cd-test"
      OAUTH_SERVER_URL: "https://api.manus.im"
      VITE_OAUTH_PORTAL_URL: "https://auth.manus.im"
      OWNER_OPEN_ID: "cd-owner"
      OWNER_NAME: "CD Owner"
      BUILT_IN_FORGE_API_URL: "https://api.manus.im"
      BUILT_IN_FORGE_API_KEY: "cd-key"
      VITE_FRONTEND_FORGE_API_KEY: "cd-key"
      VITE_FRONTEND_FORGE_API_URL: "https://api.manus.im"
      STRIPE_SECRET_KEY: "sk_test_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
      VITE_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      - name: Build frontend + backend
        run: pnpm build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/pnsp"
          JWT_SECRET: "build-placeholder-secret-32chars-ok"
          VITE_APP_ID: "build-placeholder"
          OAUTH_SERVER_URL: "https://api.manus.im"
          VITE_OAUTH_PORTAL_URL: "https://auth.manus.im"
          OWNER_OPEN_ID: "build-owner"
          OWNER_NAME: "Build Owner"
          BUILT_IN_FORGE_API_URL: "https://api.manus.im"
          BUILT_IN_FORGE_API_KEY: "build-key"
          VITE_FRONTEND_FORGE_API_KEY: "build-key"
          VITE_FRONTEND_FORGE_API_URL: "https://api.manus.im"
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
          VITE_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── 2. Deploy frontend → Vercel ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: ci-check
    timeout-minutes: 15

    environment:
      name: production-frontend
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 3. Deploy backend → Railway ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: deploy-frontend
    timeout-minutes: 15

    environment:
      name: production-backend

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
